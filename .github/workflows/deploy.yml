name: Deploy to Hostinger
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          DB_HOST=${{ secrets.DB_HOST }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          WEB3FORMS_ACCESS_KEY=${{ secrets.WEB3FORMS_ACCESS_KEY }}
          EOF

      - name: Test FTP connection
        shell: bash
        run: |
          echo "Testing FTP connection..."
          curl -v --connect-timeout 15 \
            --user "${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}" \
            "ftp://${{ secrets.FTP_HOST }}/" 2>&1 || true

      - name: Deploy via SFTP
        shell: bash
        run: |
          lftp -c "
          set sftp:auto-confirm yes
          set net:max-retries 3
          set net:timeout 30
          open sftp://${{ secrets.FTP_HOST }} -u '${{ secrets.FTP_USER }}','${{ secrets.FTP_PASS }}'
          mirror -R -e -x .git -x .env ./ /public_html/
          quit
          "

      - name: Upload .env via SFTP
        shell: bash
        run: |
          lftp -c "
          set sftp:auto-confirm yes
          set net:max-retries 3
          set net:timeout 30
          open sftp://${{ secrets.FTP_HOST }} -u '${{ secrets.FTP_USER }}','${{ secrets.FTP_PASS }}'
          put -O /public_html/ .env
          quit
          "
