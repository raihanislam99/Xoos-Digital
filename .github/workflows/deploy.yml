name: Deploy to Hostinger
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SFTP
        shell: bash
        run: |
          lftp -c "
          set sftp:auto-confirm yes
          set net:max-retries 3
          set net:timeout 30
          open sftp://${{ secrets.FTP_HOST }} -u '${{ secrets.FTP_USER }}','${{ secrets.FTP_PASS }}'
          mirror -R -e -x .git -x .env ./ /public_html/
          quit
          "
