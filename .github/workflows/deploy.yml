name: Deploy to Hostinger
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Generate .env from GitHub secrets
        run: |
          cat > .env <<ENVEOF
          DB_HOST=${{ secrets.DB_HOST }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          WEB3FORMS_ACCESS_KEY=${{ secrets.WEB3FORMS_ACCESS_KEY }}
          DEPLOY_SECRET=${{ secrets.DEPLOY_SECRET }}
          ENVEOF

      - name: Deploy via FTP
        run: |
          lftp -c "
            set ftp:ssl-allow true
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ftp:passive-mode true
            set ssl:verify-certificate false
            set net:max-retries 3
            set net:connection-limit 1
            set net:timeout 180
            set ftp:list-empty-ok true
            set cmd:default-protocol ftps
            open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }} ${{ secrets.FTP_HOST }}
            echo '=== Remote directory ==='
            pwd
            ls -la
            echo '=== Trying public_html/ ==='
            if ls public_html/ 2>/dev/null; then
              cd public_html/
              mirror -R -x ^\.git/ -x ^\.github/ -x ^\.gitignore$ -x ^\.env\.example$ -x ^Note\.txt$ -x ^README\.md$ -x ^_deploy_temp/ ./ ./
            else
              echo 'No public_html/ — mirroring to root'
              mirror -R -x ^\.git/ -x ^\.github/ -x ^\.gitignore$ -x ^\.env\.example$ -x ^Note\.txt$ -x ^README\.md$ -x ^_deploy_temp/ ./ ./
              put -O .. .env
            fi
            echo '=== Done ==='
            quit
          "
