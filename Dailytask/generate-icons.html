<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<h2>Right-click each image and "Save image as"</h2>
<p>Save as <strong>icon-192.png</strong>:</p>
<canvas id="c192" width="192" height="192"></canvas>
<p>Save as <strong>icon-512.png</strong>:</p>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function draw(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  const r = size * 0.208;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#6366f1';
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${size * 0.375}px Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('XT', size / 2, size / 2);
}
draw('c192', 192);
draw('c512', 512);
</script>
</body>
</html>
